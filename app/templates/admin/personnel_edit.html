{% extends "base.html" %}
{% block title %}Sửa thông tin - {{ qn.ho_ten }}{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h4><i class="bi bi-pencil me-2"></i>Sửa thông tin quân nhân</h4>
        <nav>
            <ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                <li class="breadcrumb-item"><a href="{{ url_for('admin.all_personnel') }}">Hồ sơ cá nhân</a></li>
                <li class="breadcrumb-item"><a href="{{ url_for('admin.admin_personnel_detail', id=qn.id) }}">{{ qn.ho_ten }}</a></li>
                <li class="breadcrumb-item active">Sửa</li>
            </ol>
        </nav>
    </div>
</div>

<div class="card-section">
    <div class="card-body-custom">
        <form method="POST" action="{{ url_for('admin.admin_personnel_edit', id=qn.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-section">
                <div class="form-section-title">Thông tin cá nhân</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="ho_ten" value="{{ qn.ho_ten }}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Cấp bậc</label>
                        <select class="form-select" name="cap_bac">
                            <option value="">-- Chọn --</option>
                            {% for cb in cap_bac_list %}
                            <option value="{{ cb }}" {% if qn.cap_bac == cb %}selected{% endif %}>{{ cb }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Đối tượng</label>
                        <select class="form-select" name="doi_tuong">
                            <option value="">-- Chọn --</option>
                            {% for dt in doi_tuong_list %}
                            <option value="{{ dt }}" {% if qn.doi_tuong == dt %}selected{% endif %}>{{ dt }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Chức danh</label>
                        <input type="text" class="form-control" name="chuc_danh" value="{{ qn.chuc_danh or '' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Chức vụ</label>
                        <input type="text" class="form-control" name="chuc_vu" value="{{ qn.chuc_vu or '' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Ngày sinh</label>
                        <input type="date" class="form-control" name="ngay_sinh"
                               value="{{ qn.ngay_sinh.strftime('%Y-%m-%d') if qn.ngay_sinh else '' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tháng/năm nhập ngũ</label>
                        <input type="text" class="form-control" name="ngay_nhap_ngu"
                               value="{{ qn.ngay_nhap_ngu or '' }}" placeholder="VD: 09/2015">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Trình độ</div>
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Học hàm</label>
                        <select class="form-select" name="hoc_ham">
                            {% for hh in hoc_ham_list %}
                            <option value="{{ hh }}" {% if qn.hoc_ham == hh %}selected{% endif %}>{{ hh }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Học vị</label>
                        <select class="form-select" name="hoc_vi">
                            {% for hv in hoc_vi_list %}
                            <option value="{{ hv }}" {% if qn.hoc_vi == hv %}selected{% endif %}>{{ hv }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Trình độ học vấn</label>
                        <input type="text" class="form-control" name="trinh_do_hoc_van" value="{{ qn.trinh_do_hoc_van or '' }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Ngoại ngữ</label>
                        <input type="text" class="form-control" name="ngoai_ngu" value="{{ qn.ngoai_ngu or '' }}">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Vai trò trong đơn vị</div>
                <div class="row g-3">
                    <div class="col-md-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="la_chi_huy" id="la_chi_huy"
                                   {% if qn.la_chi_huy %}checked{% endif %}>
                            <label class="form-check-label" for="la_chi_huy">Là chỉ huy đơn vị</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="la_bi_thu" id="la_bi_thu"
                                   {% if qn.la_bi_thu %}checked{% endif %}>
                            <label class="form-check-label" for="la_bi_thu">Là bí thư chi bộ</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-navy"><i class="bi bi-check-lg me-1"></i> Cập nhật</button>
                <a href="{{ url_for('admin.admin_personnel_detail', id=qn.id) }}" class="btn btn-outline-secondary">Hủy</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
