{% extends "base.html" %}
{% block title %}Thêm quân nhân{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h4><i class="bi bi-person-plus me-2"></i>Thêm quân nhân mới</h4>
        <nav>
            <ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                <li class="breadcrumb-item"><a href="{{ url_for('personnel.list_personnel') }}">Quân nhân</a></li>
                <li class="breadcrumb-item active">Thêm mới</li>
            </ol>
        </nav>
    </div>
</div>

<div class="card-section">
    <div class="card-body-custom">
        <form method="POST" action="{{ url_for('personnel.create_personnel') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-section">
                <div class="form-section-title">Thông tin cá nhân</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Đơn vị</label>
                        <input type="text" class="form-control" value="{{ current_user.don_vi.ten_don_vi if current_user.don_vi else '-' }}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="ho_ten" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Căn cước công dân</label>
                        <input type="text" class="form-control" name="can_cuoc_cong_dan" placeholder="VD: 012345678901">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Cấp bậc</label>
                        <select class="form-select" name="cap_bac">
                            <option value="">-- Chọn --</option>
                            {% for cb in cap_bac_list %}
                            <option value="{{ cb }}">{{ cb }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Đối tượng</label>
                        <select class="form-select" name="doi_tuong">
                            <option value="">-- Chọn --</option>
                            {% for dt in doi_tuong_list %}
                            <option value="{{ dt }}">{{ dt }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Chức danh</label>
                        <input type="text" class="form-control" name="chuc_danh">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Chức vụ</label>
                        <input class="form-control" list="chucVuOptions" name="chuc_vu" placeholder="Chọn hoặc nhập chức vụ">
                        <datalist id="chucVuOptions">
                            {% for cv in chuc_vu_options %}
                            <option value="{{ cv.ten }}"></option>
                            {% endfor %}
                        </datalist>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Đơn vị trực thuộc</label>
                        <input type="text" class="form-control" name="don_vi_truc_thuoc" placeholder="VD: Đại đội 1, Bộ môn CTĐ-CTCT, Ban Tổ chức...">
                        <small class="text-muted">Chú thích: Đại đội, bộ môn, ban, ...</small>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Ngày sinh</label>
                        <input type="date" class="form-control" name="ngay_sinh">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tháng/năm nhập ngũ</label>
                        <input type="text" class="form-control" name="ngay_nhap_ngu" placeholder="VD: 09/2015">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Trình độ</div>
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Học hàm</label>
                        <select class="form-select" name="hoc_ham">
                            {% for hh in hoc_ham_list %}
                            <option value="{{ hh }}">{{ hh }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Học vị</label>
                        <select class="form-select" name="hoc_vi">
                            {% for hv in hoc_vi_list %}
                            <option value="{{ hv }}">{{ hv }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Trình độ học vấn</label>
                        <input type="text" class="form-control" name="trinh_do_hoc_van" placeholder="VD: 12/12">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Ngoại ngữ</label>
                        <input type="text" class="form-control" name="ngoai_ngu" placeholder="VD: Anh B2">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Vai trò trong đơn vị</div>
                <div class="row g-3">
                    <div class="col-md-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="la_chi_huy" id="la_chi_huy">
                            <label class="form-check-label" for="la_chi_huy">Là chỉ huy đơn vị</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="la_bi_thu" id="la_bi_thu">
                            <label class="form-check-label" for="la_bi_thu">Là bí thư chi bộ</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-navy">
                    <i class="bi bi-check-lg me-1"></i> Lưu
                </button>
                <a href="{{ url_for('personnel.list_personnel') }}" class="btn btn-outline-secondary">Hủy</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
